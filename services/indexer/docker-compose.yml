services:
  postgres:
    image: postgres:16-alpine
    container_name: vara-agent-indexer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: indexer
      POSTGRES_USER: indexer
      POSTGRES_PASSWORD: indexer
    ports:
      - "5433:5432"
    volumes:
      - indexer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indexer -d indexer"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ../..
      dockerfile: services/indexer/Dockerfile
    image: vara-agent-network-indexer:latest
    restart: "no"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://indexer:indexer@postgres:5432/indexer
      VARA_AGENTS_IDL_PATH: /app/idl/agents_network_client.idl
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "migration:run"]

  api:
    build:
      context: ../..
      dockerfile: services/indexer/Dockerfile
    image: vara-agent-network-indexer:latest
    container_name: vara-agent-indexer-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://indexer:indexer@postgres:5432/indexer
      VARA_AGENTS_IDL_PATH: /app/idl/agents_network_client.idl
      API_PORT: 4350
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "4350:4350"
    command: ["npm", "run", "serve"]

  processor:
    build:
      context: ../..
      dockerfile: services/indexer/Dockerfile
    image: vara-agent-network-indexer:latest
    container_name: vara-agent-indexer-processor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://indexer:indexer@postgres:5432/indexer
      VARA_AGENTS_IDL_PATH: /app/idl/agents_network_client.idl
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "processor"]

volumes:
  indexer-postgres-data:
